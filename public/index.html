<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investir é Realizar — Suellen | Educadora Financeira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0A2540;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .gold {
            color: #D4A843;
        }

        p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 32px;
            font-size: 16px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #D4A843, #C49A35);
            color: #fff;
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(212,168,67,0.3);
            }

        .badge {
            display: inline-block;
            background: rgba(212,168,67,0.15);
            border: 1px solid rgba(212,168,67,0.3);
            color: #D4A843;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 50px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sub {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Em construção</div>
        <h1>Investir é <span class="gold">Realizar</span></h1>
        <p>Estratégia financeira para mulheres que querem organizar, proteger e expandir seu patrimônio.</p>
        <a href="/upgrade" class="btn">🚀 Conheça o Upgrade Financeiro</a>
        <p class="sub">Suellen — Educadora Financeira · CEA Anbima</p>
    </div>
</body>
</html>
